<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PRD Light</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
:root {
  --bg: #f0f2f5; --card: #fff; --border: #e5e7eb;
  --primary: #4f46e5; --primary-h: #4338ca;
  --danger: #ef4444; --success: #10b981; --warn: #f59e0b;
  --text: #111827; --muted: #6b7280;
  --r: 8px; --sh: 0 1px 3px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Header */
#header{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;box-shadow:var(--sh)}
#proj-label{font-size:15px;font-weight:700;color:var(--primary);white-space:nowrap}
#proj-label small{font-size:11px;color:var(--muted);font-weight:400;margin-left:6px}
#action-bar{display:flex;gap:6px;flex-wrap:wrap}
#status-area{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);white-space:nowrap}
.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* Buttons */
.btn{padding:6px 12px;border-radius:6px;border:1px solid transparent;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover:not(:disabled){background:var(--primary-h)}
.btn-outline{background:var(--card);color:var(--text);border-color:var(--border)}
.btn-outline:hover:not(:disabled){background:var(--bg);border-color:#9ca3af}
.btn-success{background:var(--success);color:#fff;border-color:var(--success)}
.btn-success:hover:not(:disabled){background:#059669}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-sm{padding:4px 8px;font-size:11px}
.hidden{display:none!important}

/* Step indicator */
#step-bar{padding:6px 16px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);flex-shrink:0}
.step{display:flex;align-items:center;gap:4px}
.step-num{width:20px;height:20px;border-radius:50%;background:var(--border);color:var(--muted);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center}
.step.active .step-num{background:var(--primary);color:#fff}
.step.done .step-num{background:var(--success);color:#fff}
.step-sep{color:var(--border)}

/* Panels */
#content{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* Phase 0: description */
#phase0{flex:1;display:flex;align-items:center;justify-content:center}
.init-card{background:var(--card);border-radius:var(--r);box-shadow:0 4px 12px rgba(0,0,0,.08);padding:32px;width:500px;max-width:95vw}
.init-card h2{font-size:18px;font-weight:700;margin-bottom:6px}
.init-card p{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5}
.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.form-label{font-size:12px;font-weight:600;color:var(--muted)}
.form-input,.form-select,.form-textarea{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.form-textarea{resize:vertical;min-height:70px}

/* Phase 1: questions */
#phase1{flex:1;overflow-y:auto;padding:20px}
.questions-wrap{max-width:640px;margin:0 auto}
.q-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:16px;margin-bottom:12px}
.q-title{font-size:14px;font-weight:600;margin-bottom:4px}
.q-hint{font-size:12px;color:var(--muted);margin-bottom:8px}
.q-answer{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;resize:vertical;min-height:56px}
.q-answer:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.q-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}

/* Phase 2: PRD */
#phase2{flex:1;display:flex;flex-direction:column;overflow:hidden}
#prd-toolbar{padding:10px 16px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
#prd-toolbar span{font-size:12px;color:var(--muted);flex:1}
#prd-content{flex:1;overflow-y:auto;padding:24px}
.md-body{max-width:760px;margin:0 auto;background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:24px;font-size:14px;line-height:1.7}
.md-body h1{font-size:20px;font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--border)}
.md-body h2{font-size:16px;font-weight:600;margin:20px 0 8px;color:var(--primary)}
.md-body h3{font-size:14px;font-weight:600;margin:14px 0 6px}
.md-body p{margin-bottom:10px;color:#374151}
.md-body ul,.md-body ol{margin:8px 0 10px 20px}
.md-body li{margin-bottom:4px}
.md-body strong{font-weight:600}

/* Phase 3: Feature spec */
#phase3{flex:1;display:flex;overflow:hidden}
#tree-panel{width:38%;min-width:260px;display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--card)}
#diag-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.panel-hd{padding:10px 14px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#tree-scroll{flex:1;overflow-y:auto;padding:6px}
.tree-row{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;cursor:pointer;font-size:13px}
.tree-row:hover{background:var(--bg)}
.tree-row.selected{background:#ede9fe}
.toggle-icon{width:16px;font-size:10px;color:var(--muted);cursor:pointer;text-align:center;transition:transform .15s;flex-shrink:0}
.toggle-icon.open{transform:rotate(90deg)}
.node-name{flex:1;font-weight:500}
.pbadge{font-size:10px;padding:1px 5px;border-radius:4px;font-weight:600}
.p-high{background:#fee2e2;color:#b91c1c}
.p-medium{background:#fef3c7;color:#92400e}
.p-low{background:#d1fae5;color:#065f46}
.tree-kids{margin-left:16px}
.tree-kids.collapsed{display:none}
#diag-scroll{flex:1;overflow:auto;padding:16px;display:flex;align-items:flex-start;justify-content:center}
#diag-container svg{max-width:100%;height:auto}
#raw-panel{background:#1e1e2e;color:#cdd6f4;padding:12px 16px;font-size:12px;font-family:'Courier New',monospace;max-height:200px;overflow:auto;flex-shrink:0;border-top:1px solid #313244}

/* Detail panel */
#detail-panel{background:var(--card);border-top:2px solid var(--border);flex-shrink:0}
#detail-hd{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border)}
#detail-name{font-size:14px;font-weight:600;flex:1}
#detail-body{padding:8px 14px;font-size:13px;color:var(--muted)}
#section-out{padding:10px 14px;font-size:13px;line-height:1.6;max-height:180px;overflow-y:auto}
#section-out h2{font-size:14px;margin:10px 0 4px;color:var(--text);font-weight:600}
#section-out h3{font-size:13px;margin:8px 0 3px;font-weight:600}
#section-out ul{margin-left:16px}

/* Modal */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100}
#modal{background:var(--card);border-radius:var(--r);box-shadow:0 20px 40px rgba(0,0,0,.2);width:440px;max-width:95vw}
#modal-hd{padding:16px 20px 12px;border-bottom:1px solid var(--border);font-size:15px;font-weight:700}
#modal-bd{padding:16px 20px;display:flex;flex-direction:column;gap:12px}
#modal-ft{padding:12px 20px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* Toast */
#toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:6px;font-size:13px;font-weight:500;box-shadow:var(--sh);z-index:200;transition:opacity .3s}
.toast-ok{background:var(--success);color:#fff}
.toast-err{background:var(--danger);color:#fff}
.toast-info{background:#3b82f6;color:#fff}
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div id="proj-label">PRD Light <small id="proj-name"></small></div>
  <div id="action-bar">
    <!-- Phase 3 buttons (hidden until phase 3) -->
    <button class="btn btn-primary hidden" id="btn-add" onclick="openModal('add')">+ 기능 추가</button>
    <button class="btn btn-outline hidden" id="btn-edit" onclick="openModal('edit')">기능 수정</button>
    <button class="btn btn-outline hidden" id="btn-del" onclick="openModal('delete')">기능 삭제</button>
    <button class="btn btn-outline hidden" id="btn-regen" onclick="regenTree()">트리 재생성</button>
    <button class="btn btn-outline btn-sm hidden" id="btn-raw" onclick="toggleRaw()">원문 보기</button>
  </div>
  <div id="status-area">
    <div class="spinner hidden" id="spinner"></div>
    <span id="status-text">준비</span>
  </div>
</div>

<!-- Step bar -->
<div id="step-bar">
  <div class="step" id="step1"><div class="step-num">1</div><span>프로젝트 설명</span></div>
  <div class="step-sep">›</div>
  <div class="step" id="step2"><div class="step-num">2</div><span>설문 답변</span></div>
  <div class="step-sep">›</div>
  <div class="step" id="step3"><div class="step-num">3</div><span>PRD 검토</span></div>
  <div class="step-sep">›</div>
  <div class="step" id="step4"><div class="step-num">4</div><span>기능명세서</span></div>
</div>

<!-- Content area -->
<div id="content">

  <!-- Phase 0: Description -->
  <div id="phase0" class="hidden">
    <div class="init-card">
      <h2>프로젝트 설명</h2>
      <p>만들고자 하는 제품/기능을 한두 문장으로 설명하세요.<br>AI가 맞춤 설문을 제안합니다.</p>
      <div class="form-group">
        <label class="form-label">프로젝트 설명 *</label>
        <textarea class="form-textarea" id="desc-input" rows="3" placeholder="예: 사용자가 식당을 검색하고 예약할 수 있는 모바일 앱"></textarea>
      </div>
      <button class="btn btn-primary" style="width:100%;padding:10px;font-size:14px" onclick="startQuestions()">설문 생성 →</button>
    </div>
  </div>

  <!-- Phase 1: Questions -->
  <div id="phase1" class="hidden">
    <div class="questions-wrap">
      <div id="q-list"></div>
      <div class="q-actions">
        <button class="btn btn-outline" onclick="goPhase(0)">← 뒤로</button>
        <button class="btn btn-primary" id="btn-gen-prd" onclick="generatePRD()">PRD 생성 →</button>
      </div>
    </div>
  </div>

  <!-- Phase 2: PRD review -->
  <div id="phase2" class="hidden">
    <div id="prd-toolbar">
      <span>PRD를 검토하고 기능명세서를 생성하세요.</span>
      <button class="btn btn-outline btn-sm" onclick="goPhase(1)">← 설문으로</button>
      <button class="btn btn-success" id="btn-gen-spec" onclick="generateSpec()">기능명세서 작성 →</button>
    </div>
    <div id="prd-content">
      <div class="md-body" id="prd-md"></div>
    </div>
  </div>

  <!-- Phase 3: Feature spec + tree + diagram -->
  <div id="phase3" class="hidden">
    <div id="tree-panel">
      <div class="panel-hd">
        기능 트리
        <span id="feat-count" style="font-size:11px"></span>
      </div>
      <div id="tree-scroll">
        <div id="tree-container"></div>
      </div>
    </div>
    <div id="diag-panel">
      <div class="panel-hd">구조 다이어그램</div>
      <div id="diag-scroll">
        <div id="diag-container"></div>
      </div>
      <pre id="raw-panel" class="hidden"></pre>
      <!-- Detail panel (shown on node click) -->
      <div id="detail-panel" class="hidden">
        <div id="detail-hd">
          <span id="detail-name"></span>
          <span id="detail-prio" class="pbadge"></span>
          <button class="btn btn-success btn-sm" onclick="generateSection()">상세 생성</button>
          <button class="btn btn-outline btn-sm" onclick="closeDetail()">✕</button>
        </div>
        <div id="detail-body"></div>
        <div id="section-out" class="hidden"></div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay" class="hidden" onclick="bgClose(event)">
  <div id="modal">
    <div id="modal-hd"></div>
    <div id="modal-bd"></div>
    <div id="modal-ft">
      <button class="btn btn-outline" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" id="modal-ok" onclick="confirmModal()">적용</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="hidden"></div>

<script>
mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });

// ── App State ──────────────────────────────────────────────────────────────
const S = {
  projectName: 'product',
  description: '',
  phase: 0,
  questions: [],
  prd: null,
  featuresMd: null,
  tree: null,
  mermaidCode: '',
  flatNodes: [],
  selectedNode: null,
  modalType: null,
};

// ── Boot ───────────────────────────────────────────────────────────────────
async function boot() {
  const d = await api('/api/state');
  S.projectName = d.project_name;
  S.description = d.description;
  S.questions = d.questions || [];
  S.prd = d.prd;
  S.featuresMd = d.features_md;
  S.mermaidCode = d.mermaid_code || '';
  S.tree = d.tree;
  S.flatNodes = d.flat_nodes || [];

  document.getElementById('proj-name').textContent = d.project_name;

  if (d.phase === 3) {
    applySpec({ features_md: d.features_md, tree: d.tree, mermaid_code: d.mermaid_code, flat_nodes: d.flat_nodes });
    showPhase(3);
  } else if (d.phase === 2) {
    renderPRD(d.features_md);
    showPhase(2);
  } else if (d.questions && d.questions.length) {
    renderQuestions(d.questions);
    showPhase(1);
  } else {
    showPhase(0);
    if (d.description) document.getElementById('desc-input').value = d.description;
  }
}

// ── Phase navigation ───────────────────────────────────────────────────────
function showPhase(n) {
  S.phase = n;
  [0,1,2,3].forEach(i => document.getElementById('phase'+i).classList.add('hidden'));
  document.getElementById('phase'+n).classList.remove('hidden');

  // Step bar
  ['step1','step2','step3','step4'].forEach((id,i) => {
    const el = document.getElementById(id);
    el.classList.remove('active','done');
    if (i+1 < n) el.classList.add('done');
    if (i+1 === n) el.classList.add('active');
    // map phase to step
  });
  const stepMap = {0:1, 1:2, 2:3, 3:4};
  const active = stepMap[n] || 1;
  ['step1','step2','step3','step4'].forEach((id,i) => {
    const el = document.getElementById(id);
    el.classList.remove('active','done');
    if (i+1 < active) el.classList.add('done');
    if (i+1 === active) el.classList.add('active');
  });

  // Phase 3 action buttons
  const ph3Btns = ['btn-add','btn-edit','btn-del','btn-regen','btn-raw'];
  ph3Btns.forEach(id => {
    const el = document.getElementById(id);
    if (n === 3) el.classList.remove('hidden');
    else el.classList.add('hidden');
  });
}

function goPhase(n) { showPhase(n); }

// ── Phase 0 → 1: Generate questions ───────────────────────────────────────
async function startQuestions() {
  const desc = document.getElementById('desc-input').value.trim();
  if (!desc) { showToast('설명을 입력하세요.', 'err'); return; }

  setLoading(true, 'AI가 맞춤 설문을 생성 중...');
  const r = await api('/api/questions', 'POST', { description: desc });
  pollUntil('/api/poll/questions', data => {
    setLoading(false);
    if (!data.ok) { showToast(data.error || '실패', 'err'); return; }
    S.questions = data.questions || [];
    renderQuestions(S.questions);
    showPhase(1);
  });
}

function renderQuestions(qs) {
  const list = document.getElementById('q-list');
  list.innerHTML = qs.map((q, i) => `
    <div class="q-card">
      <div class="q-title">Q${i+1}. ${esc(q.title)}</div>
      ${q.hint ? `<div class="q-hint">${esc(q.hint)}</div>` : ''}
      <textarea class="q-answer" id="ans-${esc(q.id)}" placeholder="답변을 입력하세요..." rows="2"></textarea>
    </div>`).join('');
}

// ── Phase 1 → 2: Generate PRD ─────────────────────────────────────────────
async function generatePRD() {
  const answers = {};
  (S.questions || []).forEach(q => {
    const el = document.getElementById('ans-' + q.id);
    answers[q.title] = el ? el.value.trim() : '';
  });

  setLoading(true, 'PRD 생성 중...');
  await api('/api/prd', 'POST', { answers });
  pollUntil('/api/poll/prd', data => {
    setLoading(false);
    if (!data.ok) { showToast(data.error || 'PRD 생성 실패', 'err'); return; }
    S.prd = data.prd;
    renderPRD(data.prd);
    showPhase(2);
    showToast('PRD 생성 완료', 'ok');
  });
}

function renderPRD(md) {
  document.getElementById('prd-md').innerHTML = mdToHtml(md || '');
}

// ── Phase 2 → 3: Generate feature spec ────────────────────────────────────
async function generateSpec() {
  document.getElementById('btn-gen-spec').disabled = true;
  setLoading(true, '기능명세서 생성 중...');
  await api('/api/spec', 'POST', {});
  pollUntil('/api/poll/spec', data => {
    setLoading(false);
    document.getElementById('btn-gen-spec').disabled = false;
    if (!data.ok) { showToast(data.error || '생성 실패', 'err'); return; }
    applySpec(data);
    showPhase(3);
    showToast('기능명세서 생성 완료!', 'ok');
  });
}

function applySpec(data) {
  S.featuresMd = data.features_md;
  S.tree = data.tree;
  S.mermaidCode = data.mermaid_code || '';
  S.flatNodes = data.flat_nodes || [];
  renderTree(S.tree);
  if (S.mermaidCode) renderMermaid(S.mermaidCode);
  document.getElementById('feat-count').textContent = S.flatNodes.length + ' 기능';
  const rawEl = document.getElementById('raw-panel');
  if (!rawEl.classList.contains('hidden')) rawEl.textContent = S.featuresMd;
}

// ── Tree rendering ─────────────────────────────────────────────────────────
function renderTree(tree) {
  if (!tree) return;
  document.getElementById('tree-container').innerHTML =
    (tree.children || []).map(n => renderNode(n, 0)).join('');
}

function renderNode(node, level) {
  const hasKids = node.children && node.children.length > 0;
  const prio = (node.priority || '').toLowerCase();
  const sel = S.selectedNode && S.selectedNode.id === node.id;
  return `
    <div class="tree-node" data-id="${node.id}">
      <div class="tree-row${sel ? ' selected' : ''}" onclick="selectNode('${node.id}')">
        <span class="toggle-icon${hasKids ? '' : ' hidden'}" id="tog-${node.id}"
          onclick="toggleKids(event,'${node.id}')">▶</span>
        <span class="node-name" style="padding-left:${level*14}px">${esc(node.name)}</span>
        ${node.priority ? `<span class="pbadge p-${prio}">${node.priority}</span>` : ''}
      </div>
      ${hasKids ? `<div class="tree-kids collapsed" id="kids-${node.id}">${node.children.map(c => renderNode(c, level+1)).join('')}</div>` : ''}
    </div>`;
}

function toggleKids(e, id) {
  e.stopPropagation();
  document.getElementById('kids-'+id)?.classList.toggle('collapsed');
  document.getElementById('tog-'+id)?.classList.toggle('open');
}

function selectNode(id) {
  const node = findNode(S.tree, id);
  if (!node) return;
  S.selectedNode = node;
  document.querySelectorAll('.tree-row.selected').forEach(el => el.classList.remove('selected'));
  document.querySelector(`.tree-node[data-id="${id}"] .tree-row`)?.classList.add('selected');

  document.getElementById('detail-panel').classList.remove('hidden');
  document.getElementById('detail-name').textContent = node.name;
  const prio = document.getElementById('detail-prio');
  prio.textContent = node.priority || '';
  prio.className = 'pbadge p-' + (node.priority || '').toLowerCase();
  document.getElementById('detail-body').textContent = node.description || '설명 없음';
  document.getElementById('section-out').classList.add('hidden');
  document.getElementById('section-out').innerHTML = '';
}

function findNode(node, id) {
  if (!node) return null;
  if (node.id === id) return node;
  for (const c of (node.children || [])) {
    const r = findNode(c, id);
    if (r) return r;
  }
  return null;
}

function closeDetail() {
  document.getElementById('detail-panel').classList.add('hidden');
  document.querySelectorAll('.tree-row.selected').forEach(el => el.classList.remove('selected'));
  S.selectedNode = null;
}

// ── Mermaid ────────────────────────────────────────────────────────────────
async function renderMermaid(code) {
  const container = document.getElementById('diag-container');
  try {
    const { svg } = await mermaid.render('mmd-' + Date.now(), code);
    container.innerHTML = svg;
  } catch {
    container.innerHTML = `<pre style="font-size:12px;color:var(--muted);padding:16px">${esc(code)}</pre>`;
  }
}

// ── Tree regenerate ────────────────────────────────────────────────────────
async function regenTree() {
  setLoading(true, '트리 재생성 중...');
  const data = await api('/api/tree/regenerate', 'POST', {});
  setLoading(false);
  if (data.ok) {
    S.tree = data.tree;
    S.flatNodes = data.flat_nodes || [];
    renderTree(data.tree);
    showToast('트리 재생성 완료', 'ok');
  } else showToast(data.error || '실패', 'err');
}

// ── Modals ─────────────────────────────────────────────────────────────────
function openModal(type) {
  S.modalType = type;
  const hd = document.getElementById('modal-hd');
  const bd = document.getElementById('modal-bd');
  const ok = document.getElementById('modal-ok');
  const opts = S.flatNodes.map(n => `<option value="${esc(n.name)}">${esc(n.name)}</option>`).join('');

  if (type === 'add') {
    hd.textContent = '기능 추가';
    ok.textContent = '추가';
    ok.className = 'btn btn-primary';
    bd.innerHTML = `
      <div class="form-group"><label class="form-label">기능명 *</label>
        <input class="form-input" id="m-name" placeholder="예: 사용자 인증"></div>
      <div class="form-group"><label class="form-label">설명</label>
        <textarea class="form-textarea" id="m-desc" placeholder="기능 설명"></textarea></div>
      <div class="form-group"><label class="form-label">우선순위</label>
        <select class="form-select" id="m-prio">
          <option value="High">High</option>
          <option value="Medium" selected>Medium</option>
          <option value="Low">Low</option></select></div>
      <div class="form-group"><label class="form-label">위치 (비워두면 최상위)</label>
        <select class="form-select" id="m-parent">
          <option value="">최상위로 추가</option>${opts}</select></div>`;
  } else if (type === 'edit') {
    hd.textContent = '기능 수정';
    ok.textContent = '수정';
    ok.className = 'btn btn-primary';
    bd.innerHTML = `
      <div class="form-group"><label class="form-label">수정할 기능 *</label>
        <select class="form-select" id="m-target"><option value="">선택</option>${opts}</select></div>
      <div class="form-group"><label class="form-label">새 기능명 (비워두면 유지)</label>
        <input class="form-input" id="m-name" placeholder="새 기능명"></div>
      <div class="form-group"><label class="form-label">새 설명 (비워두면 유지)</label>
        <textarea class="form-textarea" id="m-desc" placeholder="새 설명"></textarea></div>
      <div class="form-group"><label class="form-label">새 우선순위</label>
        <select class="form-select" id="m-prio">
          <option value="">유지</option>
          <option>High</option><option>Medium</option><option>Low</option></select></div>`;
    if (S.selectedNode) setTimeout(() => {
      const sel = document.getElementById('m-target');
      const opt = [...sel.options].find(o => o.value.trim() === S.selectedNode.name.trim());
      if (opt) sel.value = opt.value;
    }, 50);
  } else if (type === 'delete') {
    hd.textContent = '기능 삭제';
    ok.textContent = '삭제';
    ok.className = 'btn btn-danger';
    bd.innerHTML = `
      <div class="form-group"><label class="form-label">삭제할 기능 *</label>
        <select class="form-select" id="m-target"><option value="">선택</option>${opts}</select></div>
      <p style="font-size:12px;color:var(--danger)">⚠ 하위 기능도 함께 삭제됩니다.</p>`;
    if (S.selectedNode) setTimeout(() => {
      const sel = document.getElementById('m-target');
      const opt = [...sel.options].find(o => o.value.trim() === S.selectedNode.name.trim());
      if (opt) sel.value = opt.value;
    }, 50);
  }

  document.getElementById('modal-overlay').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  S.modalType = null;
}

function bgClose(e) { if (e.target.id === 'modal-overlay') closeModal(); }

async function confirmModal() {
  const type = S.modalType;
  let action, target, content;

  if (type === 'add') {
    const name = document.getElementById('m-name')?.value.trim();
    if (!name) { showToast('기능명을 입력하세요.', 'err'); return; }
    const desc = document.getElementById('m-desc')?.value.trim() || '';
    const prio = document.getElementById('m-prio')?.value || 'Medium';
    const parent = document.getElementById('m-parent')?.value.trim() || '';
    action = '추가'; target = parent || '최상위';
    content = `기능명: ${name}\n설명: ${desc}\n우선순위: ${prio}\n위치: ${parent || '최상위 기능'}`;
  } else if (type === 'edit') {
    target = document.getElementById('m-target')?.value.trim();
    if (!target) { showToast('수정할 기능을 선택하세요.', 'err'); return; }
    const newName = document.getElementById('m-name')?.value.trim() || '';
    const newDesc = document.getElementById('m-desc')?.value.trim() || '';
    const newPrio = document.getElementById('m-prio')?.value || '';
    action = '수정';
    content = [newName && `새 기능명: ${newName}`, newDesc && `새 설명: ${newDesc}`, newPrio && `새 우선순위: ${newPrio}`].filter(Boolean).join('\n');
    if (!content) { showToast('변경할 내용을 입력하세요.', 'err'); return; }
  } else if (type === 'delete') {
    target = document.getElementById('m-target')?.value.trim();
    if (!target) { showToast('삭제할 기능을 선택하세요.', 'err'); return; }
    action = '삭제'; content = '';
  }

  closeModal();
  setLoading(true, `${action} 처리 중...`);
  await api('/api/patch', 'POST', { action, target, content });
  pollUntil('/api/poll/patch', data => {
    setLoading(false);
    if (!data.ok) { showToast(data.error || '수정 실패', 'err'); return; }
    applySpec(data);
    showToast(`${action} 완료`, 'ok');
    if (S.selectedNode) closeDetail();
  });
}

// ── Section detail ─────────────────────────────────────────────────────────
async function generateSection() {
  if (!S.selectedNode) return;
  setLoading(true, '상세 명세 생성 중...');
  await api('/api/section', 'POST', {
    id: S.selectedNode.id,
    name: S.selectedNode.name,
    description: S.selectedNode.description || '',
  });
  pollUntil('/api/poll/section', data => {
    setLoading(false);
    if (!data.ok) { showToast('상세 생성 실패', 'err'); return; }
    const el = document.getElementById('section-out');
    el.innerHTML = mdToHtml(data.content);
    el.classList.remove('hidden');
    showToast('상세 명세 저장 완료', 'ok');
  });
}

// ── Raw toggle ─────────────────────────────────────────────────────────────
function toggleRaw() {
  const el = document.getElementById('raw-panel');
  el.classList.toggle('hidden');
  if (!el.classList.contains('hidden')) el.textContent = S.featuresMd || '';
  document.getElementById('btn-raw').textContent =
    el.classList.contains('hidden') ? '원문 보기' : '원문 닫기';
}

// ── Utils ──────────────────────────────────────────────────────────────────
async function api(url, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  return (await fetch(url, opts)).json();
}

function pollUntil(url, onDone, ms = 1500) {
  const check = async () => {
    const d = await api(url);
    if (d.ready) onDone(d); else setTimeout(check, ms);
  };
  setTimeout(check, ms);
}

function setLoading(on, msg = '처리 중...') {
  document.getElementById('spinner').classList.toggle('hidden', !on);
  document.getElementById('status-text').textContent = on ? msg : '준비';
  document.querySelectorAll('.btn').forEach(b => {
    if (!['btn-raw'].includes(b.id)) b.disabled = on;
  });
}

function showToast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast-${type}`;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 3000);
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function mdToHtml(md) {
  return (md||'')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g, s => `<ul>${s}</ul>`)
    .replace(/\n{2,}/g,'<br><br>')
    .replace(/\n/g,'<br>');
}
