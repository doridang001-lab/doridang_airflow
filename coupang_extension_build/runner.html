<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>쿠팡 전체 자동수집 — 대시보드</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      background: #0f1115; color: #e6e6e6; font-size: 14px;
    }
    header {
      padding: 12px 20px; background: #161a22; border-bottom: 1px solid #262b36;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    header h1 { font-size: 17px; margin: 0; font-weight: 600; }
    .controls { margin-left: auto; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    button {
      border: none; border-radius: 6px; padding: 8px 14px; font-size: 12px;
      cursor: pointer; font-weight: 600;
    }
    #startBtn    { background: #4a90d9; color: #fff; }
    #topHalfBtn  { background: #2d6fa8; color: #fff; }
    #bottomHalfBtn{ background: #2d6fa8; color: #fff; }
    #stopBtn     { background: #c0392b; color: #fff; }
    #retryBtn    { background: #e67e22; color: #fff; display: none; }
    #menuBtn     { background: #27ae60; color: #fff; }
    #manifestBtn { background: #555e6e; color: #fff; display: none; }
    #logBtn      { background: #3a4252; color: #ccc; display: none; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    .toggle { font-size: 12px; color: #9aa4b2; display: flex; align-items: center; gap: 6px; }
    #modeLabel { font-size: 12px; color: #6a7488; }

    /* 매장 필터 패널 */
    .filter-wrap {
      padding: 8px 20px; background: #12151c; border-bottom: 1px solid #1e2330;
      display: flex; align-items: center; gap: 10px;
    }
    #filterSearch {
      background: #1e2330; border: 1px solid #2e3545; border-radius: 6px;
      color: #e6e6e6; padding: 5px 10px; font-size: 12px; width: 180px;
    }
    #filterList {
      display: flex; flex-wrap: wrap; gap: 5px; flex: 1; max-height: 56px; overflow-y: auto;
    }
    .fi {
      padding: 3px 8px; border-radius: 10px; font-size: 11px; cursor: pointer;
      background: #2b313c; color: #9aa4b2; white-space: nowrap;
    }
    .fi.active { background: #4a90d9; color: #fff; }
    .fi:hover { background: #3a4560; }

    .progress-wrap { padding: 12px 20px; background: #12151c; border-bottom: 1px solid #262b36; }
    .progress-bar { height: 8px; background: #232a36; border-radius: 6px; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg,#4a90d9,#34c759); transition: width .4s; }
    .progress-meta { margin-top: 8px; display: flex; gap: 18px; font-size: 12px; color: #9aa4b2; flex-wrap: wrap; }
    .progress-meta b { color: #e6e6e6; }
    .b-warn-cnt { color: #f5a623 !important; }

    .layout { display: flex; height: calc(100vh - 210px); }
    .table-wrap { flex: 3; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 7px 12px; border-bottom: 1px solid #1e2330; font-size: 12px; }
    th { position: sticky; top: 0; background: #161a22; color: #8a93a2; font-weight: 600; z-index: 1; font-size: 11px; }
    tr.current { background: #1b2430; }
    tr.selected { background: #1a2540; }
    tr:hover { background: #181d27; cursor: pointer; }
    .badge { padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; white-space: nowrap; }
    .b-wait { background: #2b313c; color: #9aa4b2; }
    .b-run  { background: #20364d; color: #5ab0ff; }
    .b-ok   { background: #1e3a2a; color: #46d17f; }
    .b-warn { background: #3a2a10; color: #f5a623; }
    .b-fail { background: #3a1e1e; color: #ff6b6b; }

    .log-wrap { flex: 1; border-left: 1px solid #262b36; background: #0b0d11; overflow-y: auto; padding: 10px 12px; }
    .log-wrap h3 { margin: 0 0 6px; font-size: 11px; color: #8a93a2; text-transform: uppercase; letter-spacing: .5px; }
    .log-line { font-family: 'Consolas', monospace; font-size: 11px; line-height: 1.55; color: #b8c0cc; white-space: pre-wrap; word-break: break-all; }
    .log-line .t { color: #5a6373; }
    .log-line.err  { color: #ff7b7b; }
    .log-line.ok   { color: #5fd38a; }
    .log-line.info { color: #b8c0cc; }

    .summary { padding: 12px 20px; background: #12151c; border-top: 1px solid #262b36; display: none; gap: 20px; flex-wrap: wrap; align-items: center; }
    .summary.show { display: flex; }
    .summary .card { font-size: 12px; }
    .summary .card b { font-size: 18px; display: block; }
  </style>
</head>
<body>
  <header>
    <h1>🐔 쿠팡 전체 자동수집</h1>
    <span id="modeLabel"></span>
    <div class="controls">
      <label class="toggle"><input type="checkbox" id="clearSessionChk" checked> 세션 초기화</label>
      <button id="startBtn">▶ 전체 수집</button>
      <button id="topHalfBtn">▲ 상위 50%</button>
      <button id="bottomHalfBtn">▼ 하위 50%</button>
      <button id="retryBtn">↩ 재시도</button>
      <button id="stopBtn" disabled>■ 중단</button>
      <button id="menuBtn">🍔 메뉴 열기</button>
      <button id="manifestBtn">📋 매니페스트</button>
      <button id="logBtn">📄 로그 저장</button>
    </div>
  </header>

  <div class="filter-wrap">
    <input id="filterSearch" type="text" placeholder="매장 검색...">
    <div id="filterList"></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-meta">
      <span>진행 <b id="mProgress">0 / 0</b></span>
      <span>완료 <b id="mOk">0</b></span>
      <span>경고 <b class="b-warn-cnt" id="mWarn">0</b></span>
      <span>실패 <b id="mFail">0</b></span>
      <span>경과 <b id="mElapsed">00:00</b></span>
      <span>현재 <b id="mCurrent">-</b></span>
    </div>
  </div>

  <div class="layout">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:36px">#</th>
            <th>매장 / 계정</th>
            <th style="width:72px">주문서</th>
            <th style="width:72px">CMG</th>
            <th style="width:72px">메뉴</th>
            <th style="width:54px">소요</th>
            <th>비고</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <div class="log-wrap">
      <h3>라이브 로그</h3>
      <div id="log"></div>
    </div>
  </div>

  <div class="summary" id="summary">
    <div class="card">총 매장 <b id="sTotal">0</b></div>
    <div class="card">완료 <b id="sOk">0</b></div>
    <div class="card">경고 <b id="sWarn">0</b></div>
    <div class="card">실패 <b id="sFail">0</b></div>
    <div class="card">소요 <b id="sElapsed">-</b></div>
  </div>

  <script src="accounts.js"></script>
  <script src="runner.js"></script>
</body>
</html>
